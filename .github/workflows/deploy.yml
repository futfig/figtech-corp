name: Deploy to GCS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Upload to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist
          destination: figtech-corp-web
          parent: false

      - name: Set cache headers
        run: |
          gsutil setmeta -h "Cache-Control:no-cache,no-store" gs://figtech-corp-web/index.html
          gsutil -m setmeta -h "Cache-Control:public,max-age=31536000,immutable" gs://figtech-corp-web/assets/**
