name: Deploy to GCS

on:
  push:
    branches: [main]

env:
  PROJECT_ID: orvka-predict
  BUCKET: orvka-web-corp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1045597417675/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@orvka-predict.iam.gserviceaccount.com

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Upload to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist
          destination: ${{ env.BUCKET }}
          parent: false

      - name: Set cache headers
        run: |
          gcloud storage objects update gs://${{ env.BUCKET }}/index.html \
            --cache-control="no-cache,no-store"
          gcloud storage objects update "gs://${{ env.BUCKET }}/assets/**" \
            --cache-control="public,max-age=31536000,immutable"
